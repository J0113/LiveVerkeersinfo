<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LiveVerkeersinfo</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0e14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Verkeersinfo">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="settings-panel" class="panel">
    <button id="settings-toggle" class="settings-toggle" type="button" aria-label="Open settings" aria-expanded="false" aria-controls="settings-body">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="settings-body" class="settings-body hidden">
      <div class="settings-heading">Instellingen</div>
      <section id="layer-panel" class="settings-section">
        <button class="panel-btn" id="panel-toggle" type="button" aria-expanded="false">Kaartlagen <span>⌄</span></button>
        <div id="panel-body" class="hidden"></div>
      </section>
      <section id="basemap-panel" class="settings-section">
        <button class="panel-btn" id="basemap-toggle" type="button" aria-expanded="false">Kaart <span>⌄</span></button>
        <div id="basemap-body" class="hidden"></div>
      </section>
      <section id="status-panel" class="settings-section">
        <button class="panel-btn" id="status-toggle" type="button" aria-expanded="false">Feedstatus <span>⌄</span></button>
        <div id="status-body" class="hidden"></div>
      </section>
      <section id="attribution-panel" class="settings-section">
        <button class="panel-btn" id="attribution-toggle" type="button" aria-expanded="false">Bronvermelding <span>⌄</span></button>
        <div id="attribution-body" class="hidden"></div>
      </section>
    </div>
  </div>

  <!-- Sleek glassmorphic floating controls -->
  <div id="map-controls" class="panel">
    <button id="compass-btn" class="control-btn" title="Reset Compass">
      <svg id="compass-needle" viewBox="0 0 24 24" width="20" height="20">
        <path d="M12 2L15 12H9L12 2Z" fill="#ff3b30"/>
        <path d="M12 22L9 12H15L12 22Z" fill="#ffffff"/>
      </svg>
    </button>
    <button id="gps-btn" class="control-btn" title="Follow & Rotate Map">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="12" cy="12" r="3" fill="currentColor" id="gps-center-dot"/>
        <line x1="12" y1="2" x2="12" y2="4" stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="20" x2="12" y2="22" stroke="currentColor" stroke-width="2"/>
        <line x1="2" y1="12" x2="4" y2="12" stroke="currentColor" stroke-width="2"/>
        <line x1="20" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>
    <button id="recenter-btn" class="control-btn hidden" title="Re-center Map" aria-label="Re-center Map">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </button>
  </div>

  <div id="zoom-hint" class="hint hidden">Zoom in further to see traffic signs (zoom 13+)</div>

  <aside id="road-sign-hud" class="road-sign-hud hidden" aria-live="polite">
    <section id="road-sign-hud-speed" class="road-sign-hud-tile road-sign-hud-speed hidden">
      <header class="road-sign-hud-header road-sign-hud-speed-header">
        <div>
          <div class="road-sign-hud-kicker">Snelheid per rijstrook</div>
          <div id="road-sign-hud-speed-lane" class="road-sign-hud-title">GPS-signaal zoeken</div>
          <div id="road-sign-hud-speed-updated" class="road-sign-hud-updated hidden"></div>
        </div>
        <div id="road-sign-hud-speed-distance" class="road-sign-hud-distance hidden"></div>
      </header>
      <div id="road-sign-hud-speed-road" class="road-sign-hud-speed-road hidden"></div>
    </section>

    <section id="road-sign-hud-matrix" class="road-sign-hud-tile road-sign-hud-matrix hidden">
      <header class="road-sign-hud-header">
        <div>
          <div class="road-sign-hud-kicker">Volgende matrixsignaal</div>
          <div id="road-sign-hud-matrix-road" class="road-sign-hud-title"></div>
          <div id="road-sign-hud-matrix-updated" class="road-sign-hud-updated hidden"></div>
        </div>
        <div id="road-sign-hud-matrix-distance" class="road-sign-hud-distance"></div>
      </header>
      <div id="road-sign-hud-lanes" class="road-sign-hud-lanes"></div>
    </section>

    <section id="road-sign-hud-drip" class="road-sign-hud-tile road-sign-hud-drip hidden">
      <header class="road-sign-hud-header">
        <div>
          <div class="road-sign-hud-kicker">Volgende DRIP / VMS</div>
          <div id="road-sign-hud-drip-name" class="road-sign-hud-title"></div>
          <div id="road-sign-hud-drip-updated" class="road-sign-hud-updated hidden"></div>
        </div>
        <div id="road-sign-hud-drip-distance" class="road-sign-hud-distance"></div>
      </header>
      <div class="road-sign-hud-drip-display">
        <img id="road-sign-hud-drip-image" class="road-sign-hud-drip-image hidden" alt="Volgende DRIP- of VMS-bericht">
        <div id="road-sign-hud-drip-text" class="road-sign-hud-drip-text hidden"></div>
      </div>
    </section>
  </aside>

  <!-- Current-drive readouts: speed dial (bottom-left) + road name (bottom-centre) -->
  <div id="gps-speed-badge" class="gps-speed-badge hidden">
    <div id="gps-maxspeed-sign" class="gps-maxspeed-sign hidden" role="img">
      <div id="gps-maxspeed-value">–</div>
    </div>
    <strong id="gps-speed-value">–</strong>
    <span>km/h</span>
  </div>
  <div id="current-road-label" class="current-road-label hidden"></div>

  <!-- Trajectcontrole progress bar (bottom), shown while GPS tracks a section -->
  <div id="traject-progress" class="traject-progress hidden" aria-live="polite">
    <div class="traject-progress-header">
      <span id="traject-progress-street" class="traject-progress-street">Trajectcontrole</span>
      <span id="traject-progress-remaining" class="traject-progress-remaining"></span>
    </div>
    <div class="traject-progress-track">
      <div id="traject-progress-fill" class="traject-progress-fill"></div>
    </div>
    <div class="traject-progress-footer">
      <span id="traject-progress-travelled" class="traject-progress-travelled"></span>
      <span id="traject-progress-total" class="traject-progress-total"></span>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="lib.js"></script>
  <script src="config.js"></script>
  <script src="map.js"></script>
  <script src="fetch.js"></script>
  <script src="matrix.js"></script>
  <script src="hud.js"></script>
  <script src="speed.js"></script>
  <script src="ui.js"></script>
  <script src="gps.js"></script>
</body>
</html>
