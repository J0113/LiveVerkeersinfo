<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0a0a12">
  <title>Drive · LiveVerkeersinfo</title>
  <link rel="stylesheet" href="style.css?v=20260713-7">
</head>
<body class="drive">
  <header id="drive-status">
    <button id="drive-gps-btn" class="state-off" title="Start/stop GPS">GPS</button>
    <div id="drive-speed-readout"><span id="drive-kmh">–</span><small>km/h</small></div>
    <div id="drive-road"></div>
    <div id="drive-flags">
      <span id="drive-wake" class="flag" title="Screen awake">☀</span>
    </div>
  </header>

  <div id="drive-banner" class="hidden"></div>

  <main id="drive-main">
    <section id="hud-speed" class="hidden">
      <div class="hud-label">Snelheid per rijstrook</div>
      <div id="hud-speed-lanes" class="speed-strip"></div>
      <div id="hud-speed-meta" class="hud-meta"></div>
    </section>

    <section id="hud-upcoming">
      <div class="hud-label">Verderop</div>
      <div id="hud-upcoming-list"></div>
      <div id="hud-upcoming-empty" class="hud-empty">Geen borden in de buurt</div>
    </section>

    <section id="hud-passed" class="faded">
      <div class="hud-label">Net gepasseerd</div>
      <div id="hud-passed-list"></div>
    </section>
  </main>

  <script src="lib.js?v=20260713-7"></script>
  <script src="drive.js"></script>
</body>
</html>
