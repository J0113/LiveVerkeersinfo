services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ndwinfo
      POSTGRES_USER: ndwinfo
      POSTGRES_PASSWORD: ndwinfo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndwinfo"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
    depends_on:
      db:
        condition: service_healthy

  poller:
    build: .
    command: sh -c "alembic upgrade head && python -m ndwinfo.poller"
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
      NDW_BASE_URL: https://opendata.ndw.nu
      DATA_DIR: /app/data
      DB_POOL_SIZE: ${DB_POOL_SIZE:-4}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      POLLER_MAX_WORKERS: ${POLLER_MAX_WORKERS:-3}
      POLLER_BULK_MAX_INFLIGHT: ${POLLER_BULK_MAX_INFLIGHT:-1}
      POLLER_IDLE_TIMEOUT_S: ${POLLER_IDLE_TIMEOUT_S:-300}
      POLLER_MAINTENANCE_IDLE_S: ${POLLER_MAINTENANCE_IDLE_S:-900}
      DISABLED_FEEDS: ${DISABLED_FEEDS:-verkeersborden_csv,meetlocaties_shapefile,traveltime,nwb_wegvakken}
      NWB_WEGVAKKEN_URL: ${NWB_WEGVAKKEN_URL:-https://downloads.rijkswaterstaatdata.nl/nwb-wegen/geogegevens/geopackage/NWB-dagelijks/Wegvakken/Wegvakken.gpkg}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data

  app:
    build: .
    command: uvicorn ndwinfo.api.main:app --host 0.0.0.0 --port 3500
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
      NDW_BASE_URL: https://opendata.ndw.nu
      DATA_DIR: /app/data
      DB_POOL_SIZE: ${DB_POOL_SIZE:-4}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      DB_POOL_RECYCLE_S: ${DB_POOL_RECYCLE_S:-1800}
      NWB_MAX_FEATURES: ${NWB_MAX_FEATURES:-5000}
      NWB_DIAGNOSTIC_MODE: ${NWB_DIAGNOSTIC_MODE:-false}
    ports:
      - "3500:3500"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data

  osm-bootstrap:
    profiles: ["osm"]
    build: .
    command: ndwinfo-osm-bootstrap
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
      DATA_DIR: /app/data
      OSM_PBF_URL: ${OSM_PBF_URL:-https://download.geofabrik.de/europe/netherlands-latest.osm.pbf}
      OSM_PBF_PATH: /app/data/netherlands-latest.osm.pbf
      OSM_IMPORT_BATCH_SIZE: ${OSM_IMPORT_BATCH_SIZE:-5000}
      OSM_IMPORT_TEMP_DIR: /tmp
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
