services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ndwinfo
      POSTGRES_USER: ndwinfo
      POSTGRES_PASSWORD: ndwinfo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndwinfo"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
    depends_on:
      db:
        condition: service_healthy

  poller:
    build:
      context: .
      target: poller
    command: sh -c "alembic upgrade head && python -m ndwinfo.poller"
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
      NDW_BASE_URL: https://opendata.ndw.nu
      DATA_DIR: /app/data
      POLLER_MAX_WORKERS: ${POLLER_MAX_WORKERS:-3}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-4}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      DISABLED_FEEDS: ${DISABLED_FEEDS:-verkeersborden_csv}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data

  app:
    build:
      context: .
      target: app
    command: uvicorn ndwinfo.api.main:app --host 0.0.0.0 --port 3500
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
      NDW_BASE_URL: https://opendata.ndw.nu
      DATA_DIR: /app/data
      DB_POOL_SIZE: ${DB_POOL_SIZE:-4}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      DB_POOL_RECYCLE_S: ${DB_POOL_RECYCLE_S:-1800}
      NWB_PDOK_URL: ${NWB_PDOK_URL:-https://api.pdok.nl/rws/nationaal-wegenbestand-wegen/ogc/v1/collections/wegvakken/items}
      NWB_REQUEST_TIMEOUT_S: ${NWB_REQUEST_TIMEOUT_S:-20}
      NWB_CACHE_TTL_S: ${NWB_CACHE_TTL_S:-3600}
      NWB_CACHE_MAX_ENTRIES: ${NWB_CACHE_MAX_ENTRIES:-128}
      NWB_MAX_FEATURES: ${NWB_MAX_FEATURES:-5000}
      NWB_DIAGNOSTIC_MODE: ${NWB_DIAGNOSTIC_MODE:-false}
      WEGGEG_PDOK_URL: ${WEGGEG_PDOK_URL:-https://api.pdok.nl/rws/weggegevens/ogc/v1/collections/wegvak_rijstroken/items}
      WEGGEG_CACHE_TTL_S: ${WEGGEG_CACHE_TTL_S:-86400}
      WEGGEG_CACHE_MAX_ENTRIES: ${WEGGEG_CACHE_MAX_ENTRIES:-128}
      WEGGEG_MAX_FEATURES: ${WEGGEG_MAX_FEATURES:-5000}
      LANE_SPEED_MIN_ZOOM: ${LANE_SPEED_MIN_ZOOM:-13}
      LANE_MATCH_MAX_DISTANCE_M: ${LANE_MATCH_MAX_DISTANCE_M:-45}
      LANE_MATCH_MAX_HEADING_DIFFERENCE: ${LANE_MATCH_MAX_HEADING_DIFFERENCE:-50}
      LANE_SPEED_MAX_AGE_S: ${LANE_SPEED_MAX_AGE_S:-600}
      LANE_RESPONSE_CACHE_TTL_S: ${LANE_RESPONSE_CACHE_TTL_S:-10}
    ports:
      - "3500:3500"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
