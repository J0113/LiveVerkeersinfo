services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ndwinfo
      POSTGRES_USER: ndwinfo
      POSTGRES_PASSWORD: ndwinfo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndwinfo"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    command: sh -c "alembic upgrade head && uvicorn ndwinfo.api.main:app --host 0.0.0.0 --port 3500"
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
      NDW_BASE_URL: https://opendata.ndw.nu
      DATA_DIR: /app/data
    ports:
      - "3500:3500"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  poller:
    build: .
    command: python -m ndwinfo.poller
    environment:
      DATABASE_URL: postgresql+psycopg://ndwinfo:ndwinfo@db:5432/ndwinfo
      NDW_BASE_URL: https://opendata.ndw.nu
      DATA_DIR: /app/data
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
